services:
  postgres:
    image: postgres:16
    container_name: demo-postgres
    restart: always
    environment:
      POSTGRES_DB: springdb
      POSTGRES_USER: ghofrane
      POSTGRES_PASSWORD: ghof123*
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
